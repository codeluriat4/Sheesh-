name: Agent Artifact Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Allows you to trigger this workflow manually or from another agent dispatch
  workflow_dispatch:

jobs:
  verify:
    name: Run Safety & Verification Pipeline
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Execute Verification
        run: ./gradlew check

      - name: Archive Verification & Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports-and-logs
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 14

